appId: com.airbnbvn.scraper
productName: Airbnb VN Scraper
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: python-dist
    to: python-dist
    filter:
      - '*.exe'
win:
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
